name: Planfect
options:
  bundleIdPrefix: com.planfect
  createIntermediateGroups: true
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    # Device builds use automatic signing under the paid individual team (闫可菁 / 9K59GFVLS5).
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "9K59GFVLS5"
    # Signing stays OFF for the Simulator only, so simulator/CI builds need no identity.
    "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": "NO"
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"
    "CODE_SIGN_IDENTITY[sdk=iphonesimulator*]": ""
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.1"
targets:
  Planfect:
    type: application
    platform: iOS
    sources:
      - path: Planfect
    dependencies:
      - package: Supabase
        product: Supabase
      - target: PlanfectWidget       # embed the widget extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.planfect.app
        CODE_SIGN_ENTITLEMENTS: Planfect/Planfect.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "8"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Planfect
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Planfect uses the microphone so you can dictate your plans."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Planfect transcribes your voice on-device to capture your plans."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Planfect reads your calendar to schedule around real events, and adds the plans it makes back to your calendar."
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

  PlanfectWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PlanfectWidget
      - path: Planfect/Shared        # CategoryStyle + WidgetTask/store, shared with the app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.planfect.app.PlanfectWidget
        CODE_SIGN_ENTITLEMENTS: PlanfectWidget/PlanfectWidget.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "8"
    info:
      path: PlanfectWidget/Info.plist
      properties:
        CFBundleDisplayName: Planfect
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
