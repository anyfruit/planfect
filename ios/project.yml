name: Planfect
options:
  bundleIdPrefix: com.planfect
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    # Device builds use automatic signing (pick your Apple ID team in Xcode).
    CODE_SIGN_STYLE: Automatic
    # Signing stays OFF for the Simulator only, so simulator/CI builds need no identity.
    "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": "NO"
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"
    "CODE_SIGN_IDENTITY[sdk=iphonesimulator*]": ""
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.1"
targets:
  Planfect:
    type: application
    platform: iOS
    sources:
      - path: Planfect
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.planfect.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Planfect
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Planfect uses the microphone so you can dictate your plans."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Planfect transcribes your voice on-device to capture your plans."
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
