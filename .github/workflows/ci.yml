name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Pure TypeScript run via Node's built-in type stripping + test runner — no install step.
      - name: Server tests
        run: node --experimental-strip-types --test "server/**/*.test.ts"
      - name: Dashboard helper tests
        run: node --experimental-strip-types --test "dashboard/lib/**/*.test.ts"
